<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Steam</title>
  <script>
    window.onload = function () {
      const params = new URLSearchParams(window.location.search);
      const fullUrl = window.location.href;

      const status = document.getElementById("status");
      const message = document.getElementById("message");
      const link = document.getElementById("link");

      let appid = null;
      let mode = params.get("mode") || "store";

      if (params.get("appid")) {
        appid = params.get("appid");
      } else {
        const match = fullUrl.match(/\/app\/(\d+)/i);
        if (match) {
          appid = match[1];
        }
      }

      if (!appid) {
        status.textContent = "No valid Steam App ID found.";
        message.textContent = "You can close this tab.";
        link.style.display = "none";
        return;
      }

      const steamLink = `steam://${mode}/${appid}`;

      if (mode === "run") {
        status.textContent = `Launching App ID ${appid} in Steam...`;
        link.textContent = "Launch manually";
      } else {
        status.textContent = `Opening App ID ${appid} in Steam...`;
        link.textContent = "Open manually";
      }

      message.textContent = "If your browser asks, click “Open Steam”. This tab will try to close automatically.";
      link.href = steamLink;
      link.style.display = "inline";

      let closeAttempted = false;

      function tryClose() {
        if (closeAttempted) return;
        closeAttempted = true;
        window.open("", "_self");
        window.close();
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          setTimeout(tryClose, 800);
        }
      });

      setTimeout(() => {
        window.location.href = steamLink;
      }, 150);

      setTimeout(() => {
        if (!document.hidden) {
          status.textContent += "";
          message.textContent = "If your browser asks, click “Open Steam”. If nothing happens, use the link below. This tab may stay open depending on your browser.";
        }
      }, 2500);

      setTimeout(() => {
        if (document.hidden) {
          tryClose();
        }
      }, 5000);
    };
  </script>
</head>
<body>
  <h3 id="status">Processing Steam link...</h3>
  <p id="message"></p>
  <p><a id="link" href="#" style="display:none;">Open manually</a></p>
</body>
</html>
