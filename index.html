<html>
<head>
  <meta charset="UTF-8">
  <title>Open Steam</title>
  <script>
    window.onload = function () {
      const fullUrl = window.location.href;
      const params = new URLSearchParams(window.location.search);

      const status = document.getElementById("status");
      const message = document.getElementById("message");
      const link = document.getElementById("link");

      let appid = null;
      let mode = params.get("mode") || "store";

      // First: support ?appid=12345
      if (params.get("appid")) {
        appid = params.get("appid");
      } else {
        // Fallback: support #https://store.steampowered.com/app/12345/Game_Name/
        const match = fullUrl.match(/\/app\/(\d+)/i);
        if (match) {
          appid = match[1];
        }
      }

      if (!appid) {
        status.textContent = "No valid Steam App ID found.";
        message.textContent = "If this tab does not close automatically, you can close it.";
        link.style.display = "none";
        return;
      }

      const steamLink = `steam://${mode}/${appid}`;

      status.textContent = mode === "run"
        ? `Launching App ID ${appid} in Steam...`
        : `Opening App ID ${appid} in Steam...`;

      message.textContent = "If this tab does not close automatically, you can close it.";
      link.href = steamLink;
      link.textContent = mode === "run" ? "Launch manually" : "Open manually";
      link.style.display = "inline";

      // Launch Steam
      window.location.href = steamLink;

      // Try to close tab after short delay
      setTimeout(() => {
        window.open('', '_self');
        window.close();
      }, 1200);
    };
  </script>
</head>
<body>
  <h3 id="status">Processing Steam link...</h3>
  <p id="message"></p>
  <a id="link" href="#" style="display:none;">Open manually</a>
</body>
