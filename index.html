<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Open Steam</title>
  <script>
    window.onload = function () {
      const fullUrl = window.location.href;
      const match = fullUrl.match(/\/app\/(\d+)/i);

      const status = document.getElementById("status");

      if (!match) {
        status.textContent = "No valid Steam App ID found.";
        return;
      }

      const appid = match[1];
      const steamLink = `steam://store/${appid}`;

      status.textContent = `Opening App ID ${appid} in Steam...`;

      // Launch Steam
      window.location.href = steamLink;

      // Try to close the tab after a short delay
      setTimeout(() => {
        window.open('', '_self');
        window.close();
      }, 1200);
    };
  </script>
</head>
<body>
  <h3 id="status">Opening Steam...</h3>
  <p>If this tab does not close automatically, you can close it.</p>
</body>
</html>
